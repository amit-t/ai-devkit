# ai-devkit org list — ADDITIVE OVERRIDES ONLY.
#
# The primary source for org discovery is `gh api user/orgs` (whatever the
# authenticated gh user is a member of). You only need this file if:
#   - You want an org pinned even though you are not (yet) a member, e.g.
#     a collaborator-only repo in a partner org.
#   - You are working offline / without gh authentication and still want a
#     known org list available.
#
# One GitHub org slug per line. `#` starts a comment. The org that hosts this
# devkit checkout (inferred from its `origin` remote) is always included
# automatically — you do NOT need to list it here.
#
# Edit directly, or use: orgs.wb add <slug> / orgs.wb remove <slug>
# To see only the gh-discovered orgs:   orgs.wb gh
# To see the merged list (what init.wb shows): orgs.wb show
