name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    # Origin owns release-please. Mirror remotes receive the release PR
    # commit, tag, and GitHub release after origin completes.
    if: github.repository == 'amit-t/ai-devkit'
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
