name: docs-links

# Fails if anyone re-introduces hardcoded owner URLs into docs/. The Pages site
# resolves links via _data/orgs.yml + _includes/links.html, keyed off the
# publishing fork's owner slug. Hardcoding owners regresses that.

on:
  push:
    paths:
      - 'docs/**'
      - 'scripts/check-docs-links.sh'
      - '.github/workflows/docs-links.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'scripts/check-docs-links.sh'
      - '.github/workflows/docs-links.yml'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run docs link audit
        run: ./scripts/check-docs-links.sh

  build:
    runs-on: ubuntu-latest
    needs: audit
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: docs
      - name: Build site (default owner fallback)
        run: bundle exec jekyll build --destination _site_default --strict_front_matter
      - name: Verify default owner links resolved (amit-t)
        run: |
          set -eu
          grep -q 'github.com/amit-t/ai-ralph' _site_default/index.html
          grep -q 'github.com/amit-t/ai-devkit' _site_default/index.html
          ! grep -q 'links\.' _site_default/index.html
      - name: Build site as Invenco-Cloud-Systems-ICS publisher
        env:
          # Mirrors what GitHub Pages sets for the inv fork at deploy time so
          # the github-metadata plugin reports the inv owner without any
          # source-file edit.
          PAGES_REPO_NWO: Invenco-Cloud-Systems-ICS/ai-devkit
        run: bundle exec jekyll build --destination _site_inv --strict_front_matter
      - name: Verify inv owner links resolved
        run: |
          set -eu
          grep -q 'github.com/Invenco-Cloud-Systems-ICS/ai-ralph' _site_inv/index.html
          grep -q 'github.com/Invenco-Cloud-Systems-ICS/ai-devkit' _site_inv/index.html
          ! grep -q 'github.com/amit-t/' _site_inv/index.html
